<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f7f5f2;
      color: #2c2c2c;
      line-height: 1.7;
    }

    header {
      background: #1e1e1e;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      font-size: 28px;
    }

    .logo-text {
      color: #f4a94e;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .logo-sub {
      color: #aaa;
      font-size: 13px;
      margin-top: 2px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: #1e1e1e;
      margin-bottom: 4px;
    }

    .updated {
      font-size: 13px;
      color: #999;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 2px solid #f4a94e;
      display: inline-block;
    }

    .intro-card {
      background: #fff8ee;
      border-left: 4px solid #f4a94e;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 36px;
      font-size: 15px;
      color: #444;
    }

    .intro-card strong {
      color: #1e1e1e;
    }

    section {
      margin-bottom: 32px;
    }

    h2 {
      font-size: 17px;
      font-weight: 700;
      color: #f4a94e;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 22px 26px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      font-size: 15px;
      color: #444;
    }

    .card p { margin-bottom: 10px; }
    .card p:last-child { margin-bottom: 0; }

    .card ul {
      margin: 8px 0 0 20px;
    }

    .card ul li {
      margin-bottom: 8px;
      font-size: 15px;
      color: #444;
    }

    .card ul li strong {
      color: #1e1e1e;
    }

    .badge-none {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      font-weight: 700;
      font-size: 13px;
      padding: 3px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .permission-item {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .permission-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .permission-icon {
      font-size: 20px;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }

    .permission-text strong {
      display: block;
      color: #1e1e1e;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .permission-text span {
      font-size: 13px;
      color: #666;
    }

    .no-track {
      background: #f0faf0;
      border-radius: 8px;
      padding: 14px 18px;
      margin-top: 16px;
      font-size: 13px;
      color: #444;
      border-left: 3px solid #4caf50;
    }

    .contact-box {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 28px;
      text-align: center;
      margin-top: 40px;
    }

    .contact-box p {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .contact-box a {
      color: #f4a94e;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
    }

    .contact-box a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #aaa;
      background: #1e1e1e;
    }

    a { color: #f4a94e; text-decoration: none; }
    a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .container { padding: 24px 16px 60px; }
      .page-title { font-size: 22px; }
      header { padding: 16px 20px; }
    }

function render(lang) {
  const t = translations[lang] || translations['es'];
  document.getElementById('header-sub').textContent = t.headerSub;
  document.getElementById('footer-text').textContent = t.footer;
  document.title = t.headerSub + ' — MimoPet';

  let html = `<h1 class="page-title">${t.title}</h1>
<span class="updated">${t.updated}</span>
<div class="intro-card">${t.intro}</div>`;

  t.sections.forEach(s => {
    html += `<section><h2>${s.title}</h2><div class="card">`;

    if (s.type === 'none') {
      html += `<span class="badge-none">${s.noneLabel}</span><p>${s.body}</p>`;
      if (s.note) html += `<p style="color:#888;font-size:13px;margin-top:8px">ℹ️ ${s.note}</p>`;
    } else if (s.type === 'permissions') {
      s.permissions.forEach(p => {
        html += `<div class="permission-item">
          <div class="permission-icon">${p.icon}</div>
          <div class="permission-text"><strong>${p.name}</strong><span>${p.desc}</span></div>
        </div>`;
      });
      html += `<div class="no-track">✅ ${s.noTrack}</div>`;
    } else {
      html += `<p>${s.body}</p>`;
    }

    html += `</div></section>`;
  });

  html += `<div class="contact-box"><p>${t.contactLabel}</p><a href="mailto:devlicius.online@gmail.com">devlicius.online@gmail.com</a></div>`;
  document.getElementById('content').innerHTML = html;
}

const lang = new URLSearchParams(window.location.search).get('lang') || 'es';
render(['es','en','de','zh'].includes(lang) ? lang : 'es');
